{{define "content"}}
<div class="login-container">
  {{template "logo" .}}

  {{if .Form.code}}
    <div class="info-banner">
      <strong>Terminal authentication</strong> &middot;
      sign in to authorize your <code>tarmy</code> CLI session.
      You can close this tab when you see the success page.
    </div>
  {{end}}

  <div class="card">
    <h2 class="card-title">Sign in <small>welcome back</small></h2>
    <form method="post" action="/login{{if .Form.code}}?code={{.Form.code}}{{end}}" autocomplete="on">
      <input type="hidden" name="csrf" value="{{.CSRF}}">
      {{if .Form.code}}<input type="hidden" name="code" value="{{.Form.code}}">{{end}}
      <label class="field">
        <span class="field-label">Username</span>
        <input name="username" type="text" required autocomplete="username" value="{{.Form.username}}" autofocus>
      </label>
      <label class="field">
        <span class="field-label">Password</span>
        <input name="password" type="password" required autocomplete="current-password">
      </label>
      <button type="submit">Continue &rarr;</button>
    </form>
  </div>

  <p class="switch">
    Don't have an account?
    <a href="/signup{{if .Form.code}}?code={{.Form.code}}{{end}}">Create one</a>
  </p>
</div>
{{end}}
