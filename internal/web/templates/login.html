{{define "content"}}
<h2>Log in</h2>
<form method="post" action="/login{{if .Form.code}}?code={{.Form.code}}{{end}}" autocomplete="on">
  <input type="hidden" name="csrf" value="{{.CSRF}}">
  {{if .Form.code}}<input type="hidden" name="code" value="{{.Form.code}}">{{end}}
  <label for="username">Username</label>
  <input id="username" name="username" type="text" required value="{{.Form.username}}" autofocus>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" required autocomplete="current-password">
  <button type="submit">Log in</button>
</form>
<p class="muted">No account yet? <a href="/signup{{if .Form.code}}?code={{.Form.code}}{{end}}">Sign up</a>.</p>
{{end}}
