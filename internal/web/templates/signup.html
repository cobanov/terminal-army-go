{{define "content"}}
<h2>Sign up</h2>
<p class="muted">3-32 chars username (letters, digits, underscore, dash). Password at least 8 chars.</p>
<form method="post" action="/signup{{if .Form.code}}?code={{.Form.code}}{{end}}" autocomplete="on">
  <input type="hidden" name="csrf" value="{{.CSRF}}">
  {{if .Form.code}}<input type="hidden" name="code" value="{{.Form.code}}">{{end}}
  <label for="username">Username</label>
  <input id="username" name="username" type="text" required minlength="3" maxlength="32" value="{{.Form.username}}" autofocus>
  <label for="email">Email</label>
  <input id="email" name="email" type="email" required maxlength="255" value="{{.Form.email}}">
  <label for="password">Password</label>
  <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
  <button type="submit">Create account</button>
</form>
<p class="muted">Already have an account? <a href="/login{{if .Form.code}}?code={{.Form.code}}{{end}}">Log in</a>.</p>
{{end}}
